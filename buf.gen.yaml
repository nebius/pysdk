version: v2
plugins:
  - local: ["python3", "-m", "nebius_generator.main"]
    opt:
    - log_level=DEBUG
    - import_substitution=nebius=nebius.api.nebius
    - import_substitution=buf=nebius.api.buf
    - export_substitution=nebius=nebius.api.nebius
    - export_substitution=buf=nebius.api.buf
    - runtime_package=nebius
    - skip=google
    - skip=buf
    # - debugger_connect=localhost:56792
    out: build/generated/src
    strategy: all
    include_imports: true
